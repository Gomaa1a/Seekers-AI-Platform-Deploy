
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seekers AI - Intelligent Automation Solutions</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#a19eff",
            "background-light": "#f5f5f8",
            "background-dark": "#0b0b1a",
            "surface-dark": "#12122b",
            "border-dark": "#23234a"
          },
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'bounce-slow': 'bounce-slow 4s ease-in-out infinite',
            'glow-pulse': 'glow-pulse 3s infinite',
            'float': 'float 8s ease-in-out infinite',
          },
          keyframes: {
            'bounce-slow': {
              '0%, 100%': { transform: 'translateY(-2%)' },
              '50%': { transform: 'translateY(0)' },
            },
            'glow-pulse': {
              '0%, 100%': { opacity: 0.5, transform: 'scale(1)' },
              '50%': { opacity: 0.8, transform: 'scale(1.05)' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0) translateX(0)', opacity: 0.7 },
              '25%': { transform: 'translateY(-20px) translateX(10px)', opacity: 0.9 },
              '50%': { transform: 'translateY(-10px) translateX(-5px)', opacity: 0.8 },
              '75%': { transform: 'translateY(-25px) translateX(5px)', opacity: 0.85 },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at 50% 50%, #15152e 0%, #0b0b1a 100%);
      background-attachment: fixed;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .presentation-card {
      background: rgba(18, 18, 43, 0.7);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(161, 158, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .presentation-card:hover {
      border-color: rgba(161, 158, 255, 0.4);
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Responsive padding for the floating header */
    main.logged-in {
      padding-top: 120px !important;
    }
    @media (min-width: 768px) {
      main.logged-in {
        padding-top: 160px !important;
      }
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-100 overflow-x-hidden selection:bg-primary/30">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
